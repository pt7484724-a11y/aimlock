====================
BƯỚC 3: DÁN NỘI DUNG VÀO FILE BUILD.YML
====================

1. Sau khi đặt tên file xong, kéo xuống dưới có ô soạn thảo to
2. COPY TOÀN BỘ NỘI DUNG DƯỚI ĐÂY:

```yaml
name: Build Aimlock iOS
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Compile
      run: |
        clang++ -arch arm64 -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -framework Foundation -framework UIKit -framework IOKit -framework CoreGraphics -mios-version-min=18.0 -o aimlock aimlock_ios_complete.mm
    - name: Sign
      run: |
        brew install ldid
        ldid -Saimlock.entitlements aimlock
    - name: Package IPA
      run: |
        mkdir -p Payload/aimlock.app
        cp aimlock Payload/aimlock.app/
        cat > Payload/aimlock.app/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0"><dict>
        <key>CFBundleExecutable</key><string>aimlock</string>
        <key>CFBundleIdentifier</key><string>com.aimlock.ios</string>
        <key>CFBundleName</key><string>Aimlock</string>
        <key>CFBundleVersion</key><string>1.0</string>
        <key>CFBundlePackageType</key><string>APPL</string>
        <key>LSRequiresIPhoneOS</key><true/>
        </dict></plist>
        EOF
        zip -r aimlock.ipa Payload/
    - uses: actions/upload-artifact@v3
      with:
        name: aimlock-ipa
        path: aimlock.ipa
